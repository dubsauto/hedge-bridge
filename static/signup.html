<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/ui.css">

    <style>
        .ui-auth-card {
            max-width: 380px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="ui-body ui-auth-page">

<div class="ui-auth-shell">
    <div class="ui-panel ui-auth-card">
        <div class="ui-panel-title">Create an Account</div>

        <div id="alertContainer"></div>

        <form id="signupForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required autocomplete="username">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="ui-password-wrap">
                    <input type="password" id="password" class="form-control" required autocomplete="new-password">
                    <button type="button" class="ui-password-toggle-btn" id="togglePassword" aria-label="Show password">
                        <svg id="eyeOpen" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                        </svg>
                        <svg id="eyeClosed" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908l3.42 3.42M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="ui-auth-submit mt-2">Sign Up</button>

            <div class="ui-auth-link mt-3">
                Already have an account? <a href="/">Sign In</a>
            </div>

            <div class="ui-footnote ui-auth-note mt-3 text-center">
                New registrations require admin approval before first login.
            </div>
        </form>
    </div>
</div>

<script>
    // Password toggle
    const toggleBtn = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    toggleBtn.addEventListener("click", () => {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeOpen.style.display = "none";
            eyeClosed.style.display = "inline";
        } else {
            passwordInput.type = "password";
            eyeOpen.style.display = "inline";
            eyeClosed.style.display = "none";
        }
    });

    // Signup form
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const alertContainer = document.getElementById("alertContainer");

        alertContainer.innerHTML = "";

        if (!username || !email || !password) {
            alertContainer.innerHTML = `<div class="alert alert-danger ui-auth-alert">All fields are required</div>`;
            return;
        }

        try {
            const res = await fetch("/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                alertContainer.innerHTML = `
                    <div class="alert alert-success ui-auth-alert">
                        ${data.message || "Account created successfully! Waiting for admin approval."}
                    </div>
                `;
                // Optional: clear form
                document.getElementById("signupForm").reset();
            } else {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger ui-auth-alert">
                        ${data.detail || "Failed to create account"}
                    </div>
                `;
            }
        } catch (err) {
            alertContainer.innerHTML = `
                <div class="alert alert-danger ui-auth-alert">
                    Connection error. Please try again later.
                </div>
            `;
        }
    });
</script>

</body>
</html>
